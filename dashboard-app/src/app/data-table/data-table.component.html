<div class="table-controls">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search All Columns</mat-label>
    <input matInput (keyup)="applyGlobalFilter($event)" placeholder="E.g. Hydrogen or H">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <button mat-raised-button color="primary" (click)="createNewEntry()" class="create-button">
    <mat-icon>add</mat-icon> Create New
  </button>

  <button mat-icon-button [matMenuTriggerFor]="filterMenu" aria-label="Filter columns" class="filter-button">
    <mat-icon>filter_list</mat-icon>
  </button>
  <mat-menu #filterMenu="matMenu" class="custom-filter-menu">
    <div class="filter-header">Column Filters</div>
    <ng-container *ngFor="let col of availableColumnsForFilter">
      <div class="filter-option">
        <mat-checkbox [(ngModel)]="col.selected" (ngModelChange)="$event ? null : applyColumnFilter(col.name, '')">{{ col.label }}</mat-checkbox>
        <mat-form-field *ngIf="col.selected" appearance="outline" class="column-filter-input">
          <mat-label>Filter {{ col.label }}</mat-label>
          <input matInput (keyup)="applyColumnFilter(col.name, ($event.target as HTMLInputElement).value)" placeholder="Filter by {{col.label}}">
        </mat-form-field>
      </div>
    </ng-container>
  </mat-menu>
</div>

<div class="mat-elevation-z8 table-container">
  <table mat-table [dataSource]="dataSource" matSort>

    <!-- Position Column -->
    <ng-container matColumnDef="position">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> No. </th>
      <td mat-cell *matCellDef="let element"> {{element.position}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Weight Column -->
    <ng-container matColumnDef="weight">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Weight </th>
      <td mat-cell *matCellDef="let element"> {{element.weight}} </td>
    </ng-container>

    <!-- Symbol Column -->
    <ng-container matColumnDef="symbol">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Symbol </th>
      <td mat-cell *matCellDef="let element"> {{element.symbol}} </td>
    </ng-container>

     <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" (click)="editEntry(element)" aria-label="Edit entry">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteEntry(element)" aria-label="Delete entry">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-mdc-row" *matNoDataRow>
      <td class="mat-mdc-cell" colspan="5">No data matching the filter.</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons
                 aria-label="Select page of periodic elements">
  </mat-paginator>
</div>
